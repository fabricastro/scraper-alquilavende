name: Scrape diario de inmuebles

on:
  schedule:
    # 06:00 UTC = 03:00 hora San Juan (UTC-3, sin DST)
    - cron: "0 6 * * *"
  workflow_dispatch: {} # permite dispararlo a mano desde la UI

concurrency:
  group: scrape-diario
  cancel-in-progress: false # si una corrida sigue activa, no la mata; encola

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330 # 5h30 — bien por debajo del límite de 6h de GitHub
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      DB_NAME: ${{ secrets.DB_NAME }}
      COLLECTION_NAME: ${{ secrets.COLLECTION_NAME }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TZ: America/Argentina/San_Juan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scraper (single pass)
        run: npm run scrape
